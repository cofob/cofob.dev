name: Validate and publish

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  validate:
    name: Validate npm project
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7.0.0
      - uses: actions/setup-node@v6.4.0
        with:
          node-version: 24.11.0
          cache: npm
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - run: npm test
      - run: npm audit --audit-level=high
      - run: npm run test:static
      - run: npm run test:cloudflare

  cache:
    name: Cache Nix derivation
    needs: validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7.0.0
        with:
          lfs: true
      - uses: cachix/install-nix-action@v31.10.7
      - uses: cachix/cachix-action@v17
        with:
          name: cofob
          authToken: "${{ secrets.CACHIX_AUTH_TOKEN }}"
      - name: Check flake
        run: nix flake check
      - name: Build derivations
        run: |
          nix build .
          nix build .#dockerImage

  docker-publish:
    name: Publish Docker image
    if: github.event_name == 'push'
    needs: [validate, cache]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v7.0.0
      - uses: cachix/install-nix-action@v31.10.7
      - uses: cachix/cachix-action@v17
        with:
          name: cofob
          authToken: "${{ secrets.CACHIX_AUTH_TOKEN }}"

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4.4.0
        with:
          registry: ghcr.io
          username: "${{ github.repository_owner }}"
          password: "${{ secrets.GITHUB_TOKEN }}"

      - name: Normalize repository name
        id: repo
        run: echo "repository=${GITHUB_REPOSITORY,,}" >> "$GITHUB_OUTPUT"

      - name: Generate image metadata
        id: meta
        uses: docker/metadata-action@v6.2.0
        with:
          images: ghcr.io/${{ steps.repo.outputs.repository }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=sha
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build and load Docker image
        run: |
          nix build .#dockerImage
          docker load < result

      - name: Push image tags
        env:
          TAGS: ${{ steps.meta.outputs.tags }}
        run: |
          while IFS= read -r tag; do
            [ -n "$tag" ] || continue
            docker tag cofob-dev:latest "$tag"
            docker push "$tag"
          done <<< "$TAGS"
